<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BITS Connect - Admin Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    .header {
      text-align: center;
      margin-bottom: 30px;
      padding: 20px;
      background: rgba(200, 50, 255, 0.1);
      border: 2px solid #c832ff;
      border-radius: 15px;
    }
    .header h1 { font-size: 2.5em; color: #c832ff; margin-bottom: 10px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid #00d9ff;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      backdrop-filter: blur(10px);
    }
    .stat-card h3 { font-size: 0.9em; color: #ccc; margin-bottom: 10px; }
    .stat-number { font-size: 2.5em; font-weight: bold; color: #b3ff00; }
    .section {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(200, 50, 255, 0.2);
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .section h2 { color: #00d9ff; margin-bottom: 15px; font-size: 1.5em; }
    .data-box {
      background: rgba(0, 0, 0, 0.3);
      border-left: 4px solid #b3ff00;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 10px;
      font-family: 'Monaco', monospace;
      font-size: 0.9em;
      overflow-x: auto;
    }
    .loading { text-align: center; font-size: 1.2em; color: #b3ff00; }
    .error { color: #ff006e; background: rgba(255, 0, 110, 0.1); padding: 15px; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🛡️ Admin Dashboard</h1>
      <p>BITS Connect Moderation Center</p>
    </div>

    <div class="stats" id="statsContainer">
      <div class="loading">Loading stats...</div>
    </div>

    <div class="section">
      <h2>📊 Queue Data</h2>
      <div id="queueContainer" class="loading">Loading queue...</div>
    </div>

    <div class="section">
      <h2>📝 Confessions</h2>
      <div id="confessionsContainer" class="loading">Loading confessions...</div>
    </div>

    <div class="section">
      <h2>🚨 Crisis Alerts</h2>
      <div id="crisisContainer" class="loading">Loading alerts...</div>
    </div>
  </div>

  <script>
    const API = 'http://localhost:5001';

    async function loadData() {
      try {
        // Load stats
        const statsRes = await fetch(`${API}/api/admin/stats`);
        const statsData = await statsRes.json();
        displayStats(statsData.stats);

        // Load queue
        const queueRes = await fetch(`${API}/api/admin/queue`);
        const queueData = await queueRes.json();
        document.getElementById('queueContainer').innerHTML = `<pre>${JSON.stringify(queueData, null, 2)}</pre>`;

        // Load confessions
        const confRes = await fetch(`${API}/api/admin/confessions`);
        const confData = await confRes.json();
        document.getElementById('confessionsContainer').innerHTML = `<pre>${JSON.stringify(confData, null, 2)}</pre>`;

        // Load crisis alerts
        const crisisRes = await fetch(`${API}/api/admin/crisis-alerts`);
        const crisisData = await crisisRes.json();
        document.getElementById('crisisContainer').innerHTML = `<pre>${JSON.stringify(crisisData, null, 2)}</pre>`;
      } catch (error) {
        document.getElementById('statsContainer').innerHTML = `<div class="error">Error: ${error.message}</div>`;
      }
    }

    function displayStats(stats) {
      const html = `
        <div class="stat-card">
          <h3>Total</h3>
          <div class="stat-number">${stats.total}</div>
        </div>
        <div class="stat-card">
          <h3>Approved</h3>
          <div class="stat-number" style="color: #b3ff00;">${stats.approved}</div>
        </div>
        <div class="stat-card">
          <h3>Pending</h3>
          <div class="stat-number" style="color: #ffa500;">${stats.pending}</div>
        </div>
        <div class="stat-card">
          <h3>Crisis 🚨</h3>
          <div class="stat-number" style="color: #ff006e;">${stats.crisis}</div>
        </div>
      `;
      document.getElementById('statsContainer').innerHTML = html;
    }

    loadData();
  </script>
</body>
</html>
